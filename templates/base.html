<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LibreriaJP{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .card { transition: transform 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-5px); }
        .badge-recomendacion { background-color: #198754; }
        .footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: 50px; }
        .portada-img { width: 100%; height: 200px; object-fit: cover; }
        .portada-placeholder { width: 100%; height: 200px; background-color: #dee2e6;
            display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-book"></i> LibreriaJP
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/libros/">
                        <i class="bi bi-book-half"></i> Libros
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/autores/">
                        <i class="bi bi-person"></i> Autores
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/documentos/">
                        <i class="bi bi-file-earmark-text"></i> Documentos Técnicos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/organismos/">
                        <i class="bi bi-building"></i> Normas
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/swagger/" target="_blank">
                        <i class="bi bi-code-slash"></i> API
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/admin/" target="_blank">
                        <i class="bi bi-gear"></i> Admin
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<footer class="footer mt-5">
    <div class="container text-center">
        <p class="mb-0">
            <i class="bi bi-book"></i> LibreriaJP — 
            Diplomado Full Stack USIP © 2026
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
